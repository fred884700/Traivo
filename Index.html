function materialStep2(){
  const m=state.matData;
  const view=div({flex:1,overflowY:"auto",padding:"20px 24px",display:"flex",flexDirection:"column"});

  // Header
  const topBar=div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"});
  const backBtn=div({cursor:"pointer",fontSize:"18px",color:C.muted},[txt("span","←")]);
  backBtn.onclick=()=>{state.matStep=2;render();};
  topBar.appendChild(backBtn);
  topBar.appendChild(txt("h3","Vendre du matériel",{fontSize:"13px",fontWeight:"700"}));
  topBar.appendChild(div({width:"18px"}));
  view.appendChild(topBar);

  // Barre progression complète
  const stepsBar=div({display:"flex",gap:"6px",marginBottom:"20px",marginTop:"10px"});
  [1,2,3].forEach(()=>stepsBar.appendChild(div({flex:1,height:"3px",borderRadius:"4px",background:C.orange})));
  view.appendChild(stepsBar);

  view.appendChild(txt("h2","Récapitulatif",{fontSize:"18px",fontWeight:"800",marginBottom:"6px"}));
  view.appendChild(txt("p","Vérifiez les informations avant de publier.",{fontSize:"12px",color:C.muted,marginBottom:"18px"}));

  // ── Carrousel récap : images + PDF mélangés (identique au flux dossard)
  const recapItems=carouselItems(m._photos,null);
  if(recapItems.length>0){
   try{
    let rCur=0;
    let rImgIndexMap=[];
    recapItems.forEach((it,i)=>{if(it.type==="image")rImgIndexMap.push(i);});

    const rCarousel=div({position:"relative",width:"100%",height:"260px",minHeight:"260px",flexShrink:"0",overflow:"hidden",background:"#000",borderRadius:"14px",marginBottom:"16px"});

    const rTrack=div({display:"flex",height:"100%",width:`${recapItems.length*100}%`,transition:"transform 0.3s ease"});
    recapItems.forEach(item=>{
      const slide=div({flexShrink:0,width:`${100/recapItems.length}%`,height:"100%",overflow:"hidden",cursor:"pointer",position:"relative"});
      if(item.type==="image"){
        slide.appendChild(el("img",{src:item.src,style:css({width:"100%",height:"100%",objectFit:"cover",display:"block"})}));
        slide.onclick=()=>{
          const idx=rImgIndexMap.indexOf(recapItems.indexOf(item));
          state.matRecapViewer=idx>=0?idx:0;
          render();
        };
      }else{
        if(item.pageImage){
          slide.appendChild(el("img",{src:item.pageImage,style:css({width:"100%",height:"100%",objectFit:"cover",display:"block"})}));
        }else{
          slide.style.background=C.alt;
          slide.style.display="flex";
          slide.style.flexDirection="column";
          slide.style.alignItems="center";
          slide.style.justifyContent="center";
          slide.style.gap="8px";
          slide.appendChild(txt("span","📄",{fontSize:"40px"}));
          slide.appendChild(txt("p","Aperçu indisponible",{fontSize:"11px",color:C.muted}));
        }
        slide.onclick=()=>{state.pdfFullscreen=item;render();};
      }
      rTrack.appendChild(slide);
    });
    rCarousel.appendChild(rTrack);

    // Compteur
    const rCounter=div({position:"absolute",top:"10px",left:"10px",background:"rgba(0,0,0,0.6)",borderRadius:"20px",padding:"3px 10px",zIndex:10});
    const rCounterTxt=txt("span",`1 / ${recapItems.length}`,{fontSize:"11px",fontWeight:"600"});
    rCounter.appendChild(rCounterTxt);
    rCarousel.appendChild(rCounter);

    // Dots
    const rDotsWrap=div({position:"absolute",bottom:"8px",left:0,right:0,display:"flex",justifyContent:"center",gap:"5px",zIndex:10});
    rCarousel.appendChild(rDotsWrap);

    function rUpdateUI(){
      rCounterTxt.textContent=`${rCur+1} / ${recapItems.length}`;
      rDotsWrap.innerHTML="";
      recapItems.forEach((item,j)=>{
        const isPdf=item.type==="pdf";
        const dot=div({
          width:j===rCur?"16px":"6px",height:"6px",borderRadius:"4px",
          background:j===rCur?C.orange:(isPdf?"rgba(255,180,80,0.5)":"rgba(255,255,255,0.4)"),
          transition:"all 0.2s",cursor:"pointer"
        });
        dot.onclick=e=>{e.stopPropagation();rGoTo(j);};
        rDotsWrap.appendChild(dot);
      });
    }
    function rGoTo(i){
      rCur=Math.max(0,Math.min(recapItems.length-1,i));
      rTrack.style.transform=`translateX(-${rCur*(100/recapItems.length)}%)`;
      rUpdateUI();
    }
    rUpdateUI();

    if(recapItems.length>1){
      const aStyle={position:"absolute",top:"50%",transform:"translateY(-50%)",width:"32px",height:"32px",background:"rgba(0,0,0,0.5)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",zIndex:10,fontSize:"18px"};
      const rPrev=div({...aStyle,left:"8px"},["‹"]);
      rPrev.onclick=e=>{e.stopPropagation();rGoTo(rCur-1);};
      const rNext=div({...aStyle,right:"8px"},["›"]);
      rNext.onclick=e=>{e.stopPropagation();rGoTo(rCur+1);};
      rCarousel.appendChild(rPrev);
      rCarousel.appendChild(rNext);

      let rtx=0;
      rCarousel.addEventListener("touchstart",e=>rtx=e.touches[0].clientX,{passive:true});
      rCarousel.addEventListener("touchend",e=>{
        const dx=e.changedTouches[0].clientX-rtx;
        if(Math.abs(dx)>40){dx<0?rGoTo(rCur+1):rGoTo(rCur-1);e.preventDefault();}
      },{passive:true});
    }

    view.appendChild(rCarousel);
    view.appendChild(txt("p",`${recapItems.length} document(s) ajouté(s)`,{fontSize:"10px",color:C.muted,marginTop:"-10px",marginBottom:"14px",textAlign:"center"}));
   }catch(err){
     view.appendChild(txt("p","⚠️ Erreur d'affichage des photos : "+err.message,{fontSize:"11px",color:"#e53e3e",marginBottom:"14px",fontWeight:"600"}));
   }
  } else {
    view.appendChild(txt("p","⚠️ Aucune photo ajoutée",{fontSize:"11px",color:"#e53e3e",marginBottom:"14px",fontWeight:"600"}));
  }

  // Bloc infos
  const infoCard=div({background:C.card,borderRadius:"14px",border:`1px solid ${C.border}`,padding:"16px",marginBottom:"14px",display:"flex",flexDirection:"column",gap:"10px"});
  function row(label,val){
    const r=div({display:"flex",justifyContent:"space-between",alignItems:"center"});
    r.appendChild(txt("span",label,{fontSize:"11px",color:C.muted,fontWeight:"600"}));
    r.appendChild(txt("span",val||"–",{fontSize:"12px",fontWeight:"700",color:"#fff",textAlign:"right",maxWidth:"60%"}));
    return r;
  }
  infoCard.appendChild(row("Catégorie",m.category));
  infoCard.appendChild(row("Titre",m.titre));
  infoCard.appendChild(row("État",m.etat));
  infoCard.appendChild(row("Prix",`${m.prix} €`));
  if(m._shipping){
    const shippingLabels={"mondial_relay":"Mondial Relay","colissimo":"Colissimo","chronopost":"Chronopost","laposte_eco":"Colis éco","relais_colis":"Relais Colis","remise_main":"Remise en main"};
    const payerLabel={"acheteur":"À la charge de l'acheteur","vendeur":"Inclus dans le prix"}[m._shipping.payer]||"–";
    infoCard.appendChild(row("Transporteur",shippingLabels[m._shipping.mode]||m._shipping.mode));
    infoCard.appendChild(row("Frais de port",payerLabel));
    if(m._shipping.tarif) infoCard.appendChild(row("Tarif estimé",`${m._shipping.tarif} €`));
  }
  view.appendChild(infoCard);

  // Description
  if(m.desc){
    const descCard=div({background:C.card,borderRadius:"14px",border:`1px solid ${C.border}`,padding:"14px",marginBottom:"20px"});
    descCard.appendChild(txt("p","Description",{fontSize:"11px",color:C.muted,fontWeight:"600",marginBottom:"6px"}));
    descCard.appendChild(txt("p",m.desc,{fontSize:"12px",color:"#fff",lineHeight:"1.6"}));
    view.appendChild(descCard);
  }

  // Bouton publier
  const pubBtn=el("button",{style:css({background:C.orange,border:"none",borderRadius:"12px",padding:"16px",fontWeight:"800",color:"#fff",width:"100%",cursor:"pointer",fontSize:"14px",marginBottom:"24px",boxShadow:"0 4px 15px rgba(255,85,0,0.3)"})});
  pubBtn.textContent="🚀 Mettre en ligne";
  pubBtn.onclick=async()=>{
    pubBtn.disabled=true;pubBtn.textContent="Publication...";
    const nouvelleAnnonce={
      id:DOSSARDS.length+1,
      titre:m.titre,
      lieu:state.user.ville||"France",date:"Annonce matériel",
      prix:m.prix||0,
      type:"Matériel",
      category:m.category,
      etat:m.etat,
      dist:"–",deniv:"–",
      img:(()=>{const imgs=onlyImages(m._photos);return imgs.length>0?imgs[0]:IMGS.utmb;})(),
      _photos:m._photos&&m._photos.length>0?[...m._photos]:[],
      vendeur:state.user.nom||"Moi",
      desc:m.desc||"",
      _shipping:m._shipping?Object.assign({},m._shipping):null,
      places:1,note:"Nouveau"
    };
    DOSSARDS.unshift(nouvelleAnnonce);
    await saveAnnonce(nouvelleAnnonce);
    state.matData={_init:false};
    state.matStep=1;
    alert("✅ Annonce publiée avec succès !");
    go("home");
  };
  view.appendChild(pubBtn);

  return view;
}


function messagesScreen(){ return div({padding:"20px 24px"},[txt("h2","Messages",{fontSize:"22px",fontWeight:"800"})]); }
function profilScreen(){
  const u=state.user||{};
  const view=div({flex:1,overflowY:"auto",padding:"20px 24px",paddingBottom:"30px"});

  // Header
  view.appendChild(txt("h2","Mon Profil",{fontSize:"22px",fontWeight:"800",marginBottom:"20px"}));

  // Avatar + nom
  const avatarRow=div({display:"flex",alignItems:"center",gap:"16px",marginBottom:"24px",padding:"16px",background:C.card,borderRadius:"16px",border:`1px solid ${C.border}`});
  const avatar=div({width:"58px",height:"58px",borderRadius:"50%",background:C.orange,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",flexShrink:"0"});
  avatar.textContent=u.nom?u.nom.charAt(0).toUpperCase():"👤";
  avatarRow.appendChild(avatar);
  const avatarInfo=div({flex:1});
  avatarInfo.appendChild(txt("p",u.nom||"Mon compte",{fontSize:"16px",fontWeight:"800",color:"#fff"}));
  avatarInfo.appendChild(txt("p",u.email||"Ajouter un email",{fontSize:"11px",color:C.muted,marginTop:"2px"}));
  if(u.ville) avatarInfo.appendChild(txt("p","📍 "+u.ville,{fontSize:"11px",color:C.orange,marginTop:"2px",fontWeight:"600"}));
  avatarRow.appendChild(avatarInfo);
  view.appendChild(avatarRow);

  // Formulaire profil
  view.appendChild(txt("p","Informations personnelles",{fontSize:"12px",fontWeight:"700",color:C.muted,marginBottom:"12px",textTransform:"uppercase",letterSpacing:"0.5px"}));

  function field(label,inputEl){
    const wrap=div({marginBottom:"12px"});
    wrap.appendChild(txt("span",label,{fontSize:"11px",fontWeight:"600",color:C.muted,display:"block",marginBottom:"5px"}));
    wrap.appendChild(inputEl);
    return wrap;
  }
  function inp(placeholder,value){
    return el("input",{placeholder,value:value||"",style:css({width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"11px 14px",outline:"none",fontSize:"13px",color:"#fff"})});
  }

  const inpNom=inp("ex: Jules Martin",u.nom);
  view.appendChild(field("Nom complet",inpNom));

  const inpEmail=inp("ex: jules@traivo.com",u.email);
  inpEmail.type="email";
  view.appendChild(field("Email",inpEmail));

  const inpVille=inp("ex: Chamonix",u.ville);
  view.appendChild(field("Ville",inpVille));

  const inpAdresse=inp("ex: 12 rue du Mont-Blanc",u.adresse);
  view.appendChild(field("Adresse",inpAdresse));

  const inpCp=inp("ex: 74400",u.cp);
  inpCp.type="number";
  view.appendChild(field("Code postal",inpCp));

  const inpTel=inp("ex: 06 12 34 56 78",u.tel);
  inpTel.type="tel";
  view.appendChild(field("Téléphone",inpTel));

  // Bouton sauvegarder
  const saveBtn=el("button",{style:css({background:C.orange,border:"none",borderRadius:"12px",padding:"14px",fontWeight:"700",color:"#fff",width:"100%",cursor:"pointer",fontSize:"13px",marginTop:"8px",boxShadow:"0 4px 15px rgba(255,85,0,0.25)"})});
  saveBtn.textContent="💾 Sauvegarder";
  saveBtn.onclick=async()=>{
    state.user=Object.assign({},state.user,{
      nom:inpNom.value.trim()||state.user.nom,
      email:inpEmail.value.trim()||state.user.email,
      ville:inpVille.value.trim()||state.user.ville,
      adresse:inpAdresse.value.trim(),
      cp:inpCp.value.trim(),
      tel:inpTel.value.trim()
    });
    // Sauvegarde en BDD Supabase
    const sb=getSupabase();
    if(sb&&state.user._supaId){
      try{
        await sb.from("profiles").upsert({
          id:state.user._supaId,
          nom:state.user.nom,
          email:state.user.email,
          ville:state.user.ville,
          adresse:state.user.adresse,
          cp:state.user.cp,
          tel:state.user.tel
        });
      }catch(e){console.warn("Sauvegarde profil:",e);}
    }
    saveBtn.textContent="✅ Profil mis à jour !";
    saveBtn.style.background="#10b981";
    setTimeout(()=>{saveBtn.textContent="💾 Sauvegarder";saveBtn.style.background=C.orange;},2000);
    render();
  };
  view.appendChild(saveBtn);

  // Section mes annonces
  const mesAnnonces=DOSSARDS.filter(d=>d.vendeur===state.user.nom);
  if(mesAnnonces.length>0){
    view.appendChild(txt("p","Mes annonces",{fontSize:"12px",fontWeight:"700",color:C.muted,marginTop:"28px",marginBottom:"12px",textTransform:"uppercase",letterSpacing:"0.5px"}));
    mesAnnonces.forEach(d=>{
      const card=div({background:C.card,border:`1px solid ${C.border}`,borderRadius:"14px",padding:"12px",display:"flex",gap:"12px",alignItems:"center",marginBottom:"10px",cursor:"pointer"});
      card.onclick=()=>go("detail",{item:d});
      card.appendChild(el("img",{src:d.img,style:css({width:"52px",height:"52px",borderRadius:"10px",objectFit:"cover",flexShrink:"0"})}));
      const info=div({flex:1});
      info.appendChild(txt("p",d.titre,{fontSize:"12px",fontWeight:"700",color:"#fff"}));
      info.appendChild(txt("p",`${d.prix} €`,{fontSize:"13px",fontWeight:"900",color:C.orange,marginTop:"3px"}));
      card.appendChild(info);
      card.appendChild(txt("span","›",{fontSize:"20px",color:C.muted}));
      view.appendChild(card);
    });
  }

  // Déconnexion
  const logoutBtn=el("button",{style:css({background:"transparent",border:`1px solid ${C.border}`,borderRadius:"12px",padding:"12px",fontWeight:"600",color:C.muted,width:"100%",cursor:"pointer",fontSize:"13px",marginTop:"16px"})});
  logoutBtn.textContent="Se déconnecter";
  logoutBtn.onclick=async()=>{
    const sb=getSupabase();
    if(sb) await sb.auth.signOut();
    state.user={nom:"",email:"",ville:"",adresse:"",cp:"",tel:""};
    go("auth");
  };
  view.appendChild(logoutBtn);

  return view;
}

// ── BARRE DE NAVIGATION INFÉRIEURE AVEC TEXTE ──────────────────────────────
function bottomTabs(){
  const nav=div({height:"76px",background:"#0A0E12",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-around",alignItems:"center",paddingBottom:"12px"});
  const menu=[{id:"home",label:"Accueil",ico:"🏠"},{id:"search",label:"Rechercher",ico:"🔍"},{id:"publish",label:"Vendre",ico:"➕"},{id:"messages",label:"Messages",ico:"💬"},{id:"profil",label:"Profil",ico:"👤"}];
  menu.forEach(m=>{
    const act=state.screen===m.id;
    const item=el("div",{style:css({display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer"})});
    item.onclick=()=>{
      if(m.id==="publish"){
        // Réinitialise le choix pour repasser par l'écran de sélection Dossard/Matériel
        state.pubMode=null;
        state.matStep=1;
      }
      go(m.id);
    };
    item.appendChild(txt("span",m.ico,{fontSize:"20px",color:act?C.orange:"#fff",opacity:act?1:0.4}));
    item.appendChild(txt("span",m.label,{fontSize:"10px",color:act?C.white:C.muted,marginTop:"4px",fontWeight:act?"600":"400"}));
    nav.appendChild(item);
  });
  return nav;
}

// ── LANCEMENT DE L'APPLICATION ───────────────────────────────────────────────
window.addEventListener('error',function(e){
  // Supprime silencieusement toutes les erreurs de scripts externes (CDN bloqués)
  if(!e.filename||e.filename===''||e.lineno===0){return true;}
  if(e.filename&&(e.filename.includes('cdn.')||e.filename.includes('unpkg.')||e.filename.includes('jsdelivr.'))){return true;}
  console.error('Erreur JS:',e.message,'at',e.filename,'line',e.lineno);
},true); // true = capture phase, intercepte avant que l'erreur remonte

window.onload=async()=>{
  try {
    render(); // L'app démarre IMMÉDIATEMENT — Supabase se connecte en arrière-plan

    // Charge Supabase sans bloquer l'affichage
    const sb=await loadSupabase();
    if(sb){
      const {data:{session}}=await sb.auth.getSession();
      if(session){
        await loadUserProfile(sb,session.user.id);
        state.user.email=session.user.email;
        state.screen="home";
        render();
      }
      loadAnnonces();
      sb.auth.onAuthStateChange((event,session)=>{
        if(event==="SIGNED_OUT"){
          state.user={nom:"",email:"",ville:"",adresse:"",cp:"",tel:""};
          state.screen="landing";
          render();
        }
      });
    }else{
      console.log("Mode hors-ligne : Supabase indisponible, données locales utilisées");
    }
  } catch(err) {
    console.error("Erreur démarrage:",err);
    render(); // Tente quand même d'afficher l'app
  }
};
</script>
